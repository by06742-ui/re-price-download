name: Build and Release EXE
on:
  push:
    branches: [ main ]
  workflow_dispatch:
permissions:
  contents: write
jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install numpy openpyxl pyinstaller
      - name: Build EXE
        run: >
          python -m PyInstaller --onefile --windowed --name RE_price
          --collect-all openpyxl
          --add-data "prices.json;."
          --add-data "PNU_coords_lite.npz;."
          --add-data "dongnames.csv;."
          --add-data "ho_lite.npz;."
          --add-data "road_lite.npz;."
          RE_price.py
      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: 부동산 실거래가 산출기 (최신)
          files: dist/RE_price.exe
